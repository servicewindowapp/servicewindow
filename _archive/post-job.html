<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Post a Job — ServiceWindow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--fire:#FF5400;--navy:#0D1B2A;--smoke:#F5F0EB;--charcoal:#2C3E50;--white:#FFFFFF;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Sora',sans-serif;background:#0d1f2d;color:#ffffff;}
img{max-width:100%;height:auto;display:block;}
a{text-decoration:none;color:inherit;}button{font-family:'Sora',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'Sora',sans-serif;}
/* NAV */
.topbar{position:sticky;top:0;z-index:100;background:#0D1B2A;border-bottom:1px solid rgba(255,255,255,0.1);height:56px;padding:0 16px;display:flex;align-items:center;justify-content:space-between;}
@media(min-width:768px){.topbar{padding:0 40px;}}
.logo-link{height:28px;width:auto;flex-shrink:0;display:flex;align-items:center;cursor:pointer;background:none;border:none;color:#white;transition:opacity .2s;}
.logo-link:hover{opacity:.8;}
.back-link{font-size:.9rem;font-weight:600;color:rgba(255,255,255,0.85);transition:color .2s;}
.back-link:hover{color:var(--fire);}
/* PAGE */
.page{display:flex;flex-direction:column;min-height:100vh;}
.page-content{flex:1;padding:20px 16px;max-width:600px;margin:0 auto;width:100%;}
@media(min-width:768px){.page-content{padding:32px 20px;}}
.page-header{margin-bottom:24px;}
.page-title{font-size:1.5rem;font-weight:700;line-height:1.2;margin-bottom:6px;}
.page-subtitle{font-size:.9rem;color:rgba(255,255,255,0.7);line-height:1.4;}
/* FORM */
.form-group{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.form-label{font-size:.8rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,0.7);}
.form-control,.form-textarea{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#ffffff;font-size:.9rem;transition:all .15s;}
.form-control:focus,.form-textarea:focus{outline:none;border-color:var(--fire);box-shadow:0 0 0 2px rgba(255,107,53,0.2);}
.form-control::placeholder,.form-textarea::placeholder{color:rgba(255,255,255,0.5);}
.form-textarea{resize:vertical;min-height:100px;}
.form-conditional{display:none;}
.form-conditional.show{display:flex;}
.btn{display:inline-flex;align-items:center;justify-content:center;height:52px;padding:0 20px;background:var(--fire);color:#white;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .2s;width:100%;}
.btn:hover{background:#FF7A33;}
.btn:active{transform:scale(.98);}
/* SUCCESS STATE */
.success-state{display:none;text-align:center;}
.success-state.show{display:block;}
.success-icon{font-size:3rem;margin-bottom:16px;}
.success-title{font-size:1.3rem;font-weight:700;margin-bottom:8px;}
.success-text{color:rgba(255,255,255,0.7);margin-bottom:20px;}
.success-link{display:inline-block;color:var(--fire);font-weight:600;transition:color .2s;}
.success-link:hover{color:#FF7A33;}
/* CONDITIONAL SHOW/HIDE */
.conditional-group{margin-bottom:16px;}
</style>
</head>
<body>
<div class="page">
  <nav class="topbar">
    <button class="logo-link" onclick="window.location.href='truck-dashboard.html'">&larr; Truck Dashboard</button>
    <div></div>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <h1 class="page-title">Post a Job</h1>
      <p class="page-subtitle">Find crew for your truck — from one event to a full season</p>
    </div>

    <form id="jobForm" class="job-form">
      <input type="hidden" name="_subject" value="Job Posting — ServiceWindow">

      <div class="form-group">
        <label class="form-label">Job Title *</label>
        <input class="form-control" type="text" name="job_title" placeholder="Line Cook, Server, Driver, Event Help..." required>
      </div>

      <div class="form-group">
        <label class="form-label">Employment Type *</label>
        <select class="form-control" name="employment_type" id="employmentType" required onchange="toggleJobDates()">
          <option value="">Select employment type...</option>
          <option value="One Day">One Day</option>
          <option value="One Weekend">One Weekend</option>
          <option value="One Week">One Week</option>
          <option value="Seasonal">Seasonal</option>
          <option value="Part-Time Ongoing">Part-Time Ongoing</option>
          <option value="Full-Time Ongoing">Full-Time Ongoing</option>
        </select>
      </div>

      <div class="form-group form-conditional" id="jobDatesGroup">
        <label class="form-label">Job Date(s) *</label>
        <input class="form-control" type="text" name="job_dates" placeholder="April 12, 2026 or April 12-13, 2026">
      </div>

      <div class="form-group">
        <label class="form-label">Pay Rate *</label>
        <input class="form-control" type="text" name="pay_rate" placeholder="$15/hr, $100/event, $500/week..." required>
      </div>

      <div class="form-group">
        <label class="form-label">Location *</label>
        <input class="form-control" type="text" name="location" placeholder="City or area your truck operates" required>
      </div>

      <div class="form-group form-conditional" id="weeklyScheduleGroup">
        <label class="form-label">Weekly Schedule</label>
        <textarea class="form-textarea" name="weekly_schedule" placeholder="Typical days and hours"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Requirements *</label>
        <textarea class="form-textarea" name="requirements" placeholder="Experience needed, physical requirements, certifications..." required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">About Your Truck *</label>
        <textarea class="form-textarea" name="about_truck" placeholder="Tell applicants about your operation, cuisine, and culture" required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Your Name *</label>
        <input class="form-control" type="text" name="contact_name" placeholder="Full name" required>
      </div>

      <div class="form-group">
        <label class="form-label">Contact Email *</label>
        <input class="form-control" type="email" name="contact_email" placeholder="email@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Contact Phone</label>
        <input class="form-control" type="tel" name="contact_phone" placeholder="+1 (555) 123-4567">
      </div>

      <button type="submit" class="btn">Post This Job &rarr;</button>
    </form>

    <div class="success-state" id="successState">
      <div class="success-icon">✅</div>
      <h2 class="success-title">Job Posted!</h2>
      <p class="success-text">Your job posting has been submitted. It will appear on the ServiceWindow Jobs Board within 24 hours.</p>
      <a href="truck-dashboard.html" class="success-link">← Back to Dashboard</a>
    </div>
  </div>
</div>

<script>
function toggleJobDates() {
  const type = document.getElementById('employmentType').value;
  const showDates = ['One Day', 'One Weekend', 'One Week'].includes(type);
  const showSchedule = ['Part-Time Ongoing', 'Full-Time Ongoing'].includes(type);

  document.getElementById('jobDatesGroup').classList.toggle('show', showDates);
  document.getElementById('weeklyScheduleGroup').classList.toggle('show', showSchedule);

  document.querySelector('[name="job_dates"]').required = showDates;
}

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);

  // Submit to Formspree
  try {
    const response = await fetch('https://formspree.io/f/mbdzyold', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      document.getElementById('jobForm').style.display = 'none';
      document.getElementById('successState').classList.add('show');
    } else {
      alert('Error submitting form. Please try again.');
    }
  } catch (error) {
    console.error('Error:', error);
    alert('Error submitting form. Please try again.');
  }
});
</script>
</body>
</html>

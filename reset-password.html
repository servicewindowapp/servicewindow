<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Reset Password — ServiceWindow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* DESIGN TOKENS */
:root{
  --fire:#FF5400;--fire-lt:#FF7A33;--fire-pale:#FFF0E8;
  --navy:#1E3A5F;--smoke:#1C1917;--charcoal:#292524;
  --warm-gray:#57534E;--mid-gray:#A8A29E;
  --border:#E7E5E4;--bg:#FAFAF9;--white:#FFFFFF;
  --green:#16A34A;--green-pale:#F0FDF4;
  --amber:#D97706;--amber-pale:#FFFBEB;
  --r:16px;--r-sm:10px;
  --sh-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --sh:0 4px 16px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
}

/* RESET & BASE */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Sora',sans-serif;background:#0d1f2d;color:#ffffff;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
img{max-width:100%;height:auto;display:block;}
a{text-decoration:none;color:var(--fire);}

/* PAGE CONTAINER */
.auth-wrapper{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.auth-card{
  background:#0d1f2d;border-radius:var(--r);box-shadow:var(--sh);
  padding:40px 24px;max-width:380px;width:100%;
}
@media(max-width:480px){
  .auth-card{padding:32px 20px;}
}

.auth-header{
  text-align:center;margin-bottom:32px;
}
.auth-logo{
  width:48px;height:48px;margin:0 auto 16px;
  background:var(--fire-pale);border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:1.8rem;
}
.auth-header h1{
  font-family:'Lora',serif;font-size:1.6rem;font-weight:700;
  margin-bottom:8px;color:#ffffff;
}
.auth-header p{
  font-size:.88rem;color:rgba(255,255,255,0.85);line-height:1.5;
}

/* FORM */
.form-group{
  margin-bottom:16px;
}
.form-label{
  display:block;font-size:.78rem;font-weight:600;
  color:#ffffff;margin-bottom:6px;
}
.form-input{
  width:100%;height:48px;padding:0 14px;
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:.88rem;
  background:#0d1f2d;color:#ffffff;
  transition:border-color .2s;outline:none;
}
.form-input:focus{border-color:var(--fire);}
.form-input::placeholder{color:var(--mid-gray);}

.form-submit{
  width:100%;height:48px;background:var(--fire);color:#fff;
  border:none;border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:.88rem;font-weight:700;
  cursor:pointer;transition:background .2s;margin-top:20px;
}
.form-submit:hover{background:var(--fire-lt);}
.form-submit:disabled{background:var(--mid-gray);cursor:not-allowed;}

/* MESSAGES */
.error-message{
  background:var(--red-pale,#FEF2F2);color:#991B1B;
  padding:12px 14px;border-radius:var(--r-sm);
  font-size:.84rem;margin-bottom:16px;
  border-left:3px solid #991B1B;
}
.success-message{
  background:var(--green-pale);color:var(--green);
  padding:12px 14px;border-radius:var(--r-sm);
  font-size:.84rem;margin-bottom:16px;
  border-left:3px solid var(--green);
  text-align:center;
}

/* LOADING STATE */
.loading{opacity:.6;pointer-events:none;}

/* REDIRECT MESSAGE */
.redirect-message{
  text-align:center;margin-top:16px;
  font-size:.82rem;color:rgba(255,255,255,0.85);
}
</style>
</head>
<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <!-- HEADER -->
    <div class="auth-header">
      <div class="auth-logo">🔑</div>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <!-- ERROR MESSAGE -->
    <div id="errorMsg" class="error-message" style="display:none;"></div>

    <!-- SUCCESS MESSAGE -->
    <div id="successMsg" class="success-message" style="display:none;"></div>

    <!-- RESET FORM -->
    <form id="resetForm" style="display:none;">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-input" id="newPassword" type="password" placeholder="At least 6 characters" autocomplete="new-password" required>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input class="form-input" id="confirmPassword" type="password" placeholder="Confirm your password" autocomplete="new-password" required>
      </div>

      <button type="submit" class="form-submit" id="resetBtn">Reset Password</button>
    </form>

    <!-- LOADING STATE -->
    <div id="loadingMsg" style="text-align:center;">
      <p style="font-size:.88rem;color:rgba(255,255,255,0.85);">Checking your reset link...</p>
    </div>

    <!-- EXPIRED LINK -->
    <div id="expiredMsg" style="display:none;text-align:center;">
      <p style="font-size:.88rem;color:rgba(255,255,255,0.85);margin-bottom:16px;">This reset link has expired or is invalid.</p>
      <a href="auth.html" style="display:inline-block;background:var(--fire);color:#fff;padding:12px 24px;border-radius:var(--r-sm);font-weight:700;font-size:.84rem;">Back to Login</a>
    </div>
  </div>
</div>

<!-- Supabase client -->
<script src="assets/js/supabase-client.js"></script>

<!-- Reset password logic -->
<script>
let sessionValid = false;

async function initResetPassword(){
  if(!window.supabase){
    document.addEventListener('supabase-ready', initResetPassword);
    return;
  }

  // Check if user has a valid session (Supabase sets this when redirecting from email link)
  const { data: { session } } = await window.supabase.auth.getSession();

  if(!session){
    // No valid session - reset link may be expired or invalid
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('expiredMsg').style.display = 'block';
    return;
  }

  // Session is valid, show the form
  sessionValid = true;
  document.getElementById('loadingMsg').style.display = 'none';
  document.getElementById('resetForm').style.display = 'block';

  // Handle form submission
  document.getElementById('resetForm').addEventListener('submit', handleResetPassword);
}

async function handleResetPassword(e){
  e.preventDefault();

  if(!sessionValid){
    showError('Session expired. Please request a new reset link.');
    return;
  }

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  // Validation
  if(!newPassword || !confirmPassword){
    showError('Please fill in both password fields.');
    return;
  }

  if(newPassword.length < 6){
    showError('Password must be at least 6 characters.');
    return;
  }

  if(newPassword !== confirmPassword){
    showError('Passwords do not match.');
    return;
  }

  // Update password
  const btn = document.getElementById('resetBtn');
  btn.disabled = true;
  btn.textContent = 'Resetting...';

  const { error } = await window.supabase.auth.updateUser({ password: newPassword });

  btn.disabled = false;
  btn.textContent = 'Reset Password';

  if(error){
    showError(error.message);
    return;
  }

  // Success - show message and redirect
  clearError();
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('successMsg').style.display = 'block';
  document.getElementById('successMsg').innerHTML = '✓ Password reset successfully!<div class="redirect-message">Redirecting to login in 3 seconds...</div>';

  // Redirect to auth.html after 3 seconds
  setTimeout(() => {
    window.location.href = 'auth.html';
  }, 3000);
}

function showError(msg){
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function clearError(){
  const el = document.getElementById('errorMsg');
  el.style.display = 'none';
}

// Initialize on page load
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', initResetPassword);
} else {
  initResetPassword();
}
</script>

</body>
</html>
